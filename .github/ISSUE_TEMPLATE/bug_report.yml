name: Bug
description: Incorrect behaviour or regression
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please include environment details (browser, OS, self-hosted or promptdemerde.com).
        For voice dictation after a clone: did you run `cd install && bash restore-large-assets.sh`?
        Security vulnerabilities → email **dreamproject-ai@proton.me** (see SECURITY.md), not this form.

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open… 2. Click…"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Observed behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version (footer or README)
      placeholder: "1.24.2"

  - type: textarea
    id: console
    attributes:
      label: Browser console / logs (optional)
      render: shell
